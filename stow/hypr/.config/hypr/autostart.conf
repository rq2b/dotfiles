# Extra autostart processes
# exec-once = uwsm-app -- my-service

# Hyprsunset to help with working late
exec-once = uwsm-app -- hyprsunset

# Bibata-Modern-Ice manual override (HYPR + X11)
exec-once = hyprctl setcursor Bibata-Modern-Ice 20

# Per-monitor wallpapers
exec-once = uwsm-app -- swaybg -o DP-1 -i $HOME/dotfiles/wallpapers/4-horizontal.jpg -m fill
exec-once = uwsm-app -- swaybg -o HDMI-A-1 -i $HOME/dotfiles/wallpapers/5-vertical.jpg -m fill

# Automatically closing Typora's license window
exec-once = ~/.config/hypr/scripts/close-typora-license.sh
