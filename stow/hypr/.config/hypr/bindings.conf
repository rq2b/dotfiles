# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- keepassxc

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://mail.google.com/mail/u/0/#inbox"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT, D, YouTube Music, exec, omarchy-launch-webapp "https://music.youtube.com/"
bindd = SUPER SHIFT, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# F21 - F23: Language Binds
bindd = , code:199, English, exec, hyprctl switchxkblayout current 0 >/dev/null  # F21
bindd = , code:200, Ukrainian, exec, hyprctl switchxkblayout current 1 >/dev/null  # F22
bindd = , code:201, Russian, exec, hyprctl switchxkblayout current 2 >/dev/null  # F23

# Unbinding the default screenshot utils
unbind = ALT SHIFT, S
unbind = , PRINT

# Alt + Shift + S & PrtSc bind to a custom util
bindd = ALT SHIFT, S, Screenshot, exec, $HOME/Scripts/screenshot-to-obsidian/screenshot.sh
bindd = , PRINT, Screenshot-PrtSc, exec, $HOME/Scripts/screenshot-to-obsidian/screenshot.sh

$mathmode = $HOME/Scripts/math-chars/mathmode-toggle.sh

# RShift (Rebound) bind to toggle math input mode
bind = , code:202, exec, sh -c "$HOME/Scripts/math-chars/mathmode-toggle.sh"
submap = greek

bind = , a, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 03B1'
bind = , a, exec, $mathmode

bind = , b, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 03B2'
bind = , b, exec, $mathmode

bind = , y, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 03B3'
bind = , y, exec, $mathmode

bind = , p, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 03C0'
bind = , p, exec, $mathmode

bind = SHIFT, a, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2220'
bind = SHIFT, a, exec, $mathmode

bind = , t, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 25B3'
bind = , t, exec, $mathmode

bind = , equal, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 002b'
bind = , equal, exec, $mathmode

bind = , comma, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2264'
bind = , comma, exec, $mathmode

bind = , period, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2265'
bind = , period, exec, $mathmode

bind = SHIFT, grave, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2248'
bind = SHIFT, grave, exec, $mathmode

bind = , e, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2208'
bind = , e, exec, $mathmode

bind = , u, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 222a'
bind = , u, exec, $mathmode

bind = , n, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2229'
bind = , n, exec, $mathmode

bind = , r, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 211D'
bind = , r, exec, $mathmode

bind = , z, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2124'
bind = , z, exec, $mathmode

bind = , o, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2205'
bind = , o, exec, $mathmode

bind = , s, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 221a'
bind = , s, exec, $mathmode

bind = SHIFT, backslash, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 2225'
bind = SHIFT, backslash, exec, $mathmode

bind = , backslash, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 22a5'
bind = , backslash, exec, $mathmode

bind = , grave, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 00b0'
bind = , grave, exec, $mathmode

bind = , 2, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 00b2'
bind = , 2, exec, $mathmode

bind = , 3, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 00b3'
bind = , 3, exec, $mathmode

bind = , 8, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 00d7'
bind = , 8, exec, $mathmode

bind = , 9, exec, sh -c '$HOME/Scripts/math-chars/unicode.sh 0028 0029; wtype -k Left'
bind = , 9, exec, $mathmode

bind = , bracketleft, exec, sh -c 'wtype "sin()"; wtype -k Left'
bind = , bracketleft, exec, $mathmode

bind = , bracketright, exec, sh -c 'wtype "cos"; $HOME/Scripts/math-chars/unicode.sh 0028 0029; wtype -k Left'
bind = , bracketright, exec, $mathmode

bind = , semicolon, exec, sh -c 'wtype "tan"; $HOME/Scripts/math-chars/unicode.sh 0028 0029; wtype -k Left'
bind = , semicolon, exec, $mathmode

bind = , apostrophe, exec, sh -c 'wtype "cot"; $HOME/Scripts/math-chars/unicode.sh 0028 0029; wtype -k Left'
bind = , apostrophe, exec, $mathmode

bind = , minus, exec, sh -c 'wtype "< >"; wtype -k Return; for _ in $(seq 1 5); do "$HOME/Scripts/math-chars/unicode.sh" 23af; done; wtype -k Return; wtype "< >"'
bind = , minus, exec, $mathmode

bind = SHIFT, minus, exec, sh -c 'for _ in $(seq 1 5); do "$HOME/Scripts/math-chars/unicode.sh" 23af; done'
bind = SHIFT, minus, exec, $mathmode

bind = , escape, exec, $mathmode
bind = , code:202, exec, sh -c '$mathmode; wtype -k Right'

submap = reset
